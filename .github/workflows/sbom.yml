# Per-image SPDX SBOM generation, attached to releases as OCI artifacts.

name: sbom

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  sbom:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [mcp-gateway, memory-service, approval-shim, policy-judge]
    steps:
      - uses: actions/checkout@v4
      - uses: anchore/sbom-action@v0
        with:
          path: services/${{ matrix.image }}
          format: spdx-json
          output-file: ${{ matrix.image }}.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: ${{ matrix.image }}.spdx.json
