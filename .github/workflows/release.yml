# Release pipeline: builds the clawfirm CLI for linux/darwin x amd64/arm64,
# signs every artifact with Sigstore (keyless GitHub OIDC), generates SBOMs,
# and publishes a GitHub Release.

name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write       # create the release
  id-token: write       # request the OIDC token for keyless signing
  packages: write       # push container images to ghcr.io

jobs:
  build:
    name: build & sign
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        os:   [linux, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: build
        env:
          GOOS:   ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          name=clawfirm-${GOOS}-${GOARCH}
          ldflags="-s -w \
            -X github.com/jimmershere/clawfirm/internal/version.Version=${GITHUB_REF_NAME} \
            -X github.com/jimmershere/clawfirm/internal/version.Commit=${GITHUB_SHA} \
            -X github.com/jimmershere/clawfirm/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "$ldflags" -o dist/clawfirm ./cmd/clawfirm
          tar -czf dist/${name}.tar.gz -C dist clawfirm
          rm -f dist/clawfirm
          (cd dist && sha256sum ${name}.tar.gz > ${name}.tar.gz.sha256)
      - uses: sigstore/cosign-installer@v3
      - name: sign
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for f in dist/clawfirm-*.tar.gz; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" \
              "$f"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: clawfirm-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  release:
    name: github release
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: gather
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.sig" -o -name "*.crt" -o -name "*.sha256" \) -exec mv -t release/ {} +
          ls -la release
      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  containers:
    name: container images
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        image: [mcp-gateway, memory-service, approval-shim, policy-judge]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/clawfirm/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/clawfirm/${{ matrix.image }}:latest
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@v3
      - name: sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes ghcr.io/clawfirm/${{ matrix.image }}:${{ github.ref_name }}
