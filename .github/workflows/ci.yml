name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache: true }
      - run: gofmt -l . | tee /dev/stderr | (! read)
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
      - uses: golangci/golangci-lint-action@v6
        with: { version: v1.62 }

  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install ruff black
      - run: ruff check services/memory-service services/policy-judge
      - run: black --check services/memory-service services/policy-judge

  shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with: { scandir: ./scripts }

  yaml:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: pip install yamllint
      - run: yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, comments-indentation: disable}}" deploy integrations
