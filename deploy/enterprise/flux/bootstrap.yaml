# Flux bootstrap seed for ClawFirm Enterprise.
# Apply this once after `flux bootstrap git`; Flux reconciles the rest.

apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: clawfirm-cluster
  namespace: flux-system
spec:
  interval: 1m
  url: ssh://git@github.com/your-org/clawfirm-cluster.git
  ref:
    branch: main
  secretRef:
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: clawfirm-platform
  namespace: flux-system
spec:
  interval: 5m
  path: ./clusters/clawfirm-prod/platform
  prune: true
  sourceRef:
    kind: GitRepository
    name: clawfirm-cluster
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: mcp-gateway
      namespace: clawfirm
