# ClawFirm SMB tier - k3s Kustomize overlay.
#
# Apply with:
#   kubectl apply -k deploy/smb/k3s
#
# Or via the CLI:
#   clawfirm up   (after `clawfirm init --tier smb`)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clawfirm

resources:
  - namespace.yaml
  - postgres.yaml
  - redis.yaml
  - openbao.yaml
  - authentik.yaml
  - ollama.yaml
  - vllm.yaml
  - dify.yaml
  - n8n.yaml
  - langgraph.yaml
  - openhands.yaml
  - clawrails.yaml
  - clawsecure.yaml
  - memory-service.yaml
  - mcp-gateway.yaml
  - approval-shim.yaml
  - policy-judge.yaml
  - edgeclaw.yaml
  - langfuse.yaml
  - headscale.yaml
  - ingress.yaml

commonLabels:
  app.kubernetes.io/part-of: clawfirm
  app.kubernetes.io/managed-by: clawfirm-cli

configMapGenerator:
  - name: clawfirm-config
    literals:
      - tier=smb
      - default_governance_tier=1
      - frontier_egress=deny-by-default
      - sandbox_default=gvisor

# Secrets are sealed via SealedSecrets or pulled from OpenBao via the
# vault-csi-provider. They are NOT generated by Kustomize for SMB+.
