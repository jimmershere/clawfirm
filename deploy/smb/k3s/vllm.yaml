apiVersion: v1
kind: Service
metadata:
  name: vllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      nodeSelector:
        clawfirm.io/inference: "true"
      containers:
        - name: vllm
          image: vllm/vllm-openai:0.17
          args:
            - "--model"
            - "Qwen/Qwen3.6-27B-Instruct"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--tensor-parallel-size"
            - "1"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--max-model-len"
            - "32768"
            - "--enable-prefix-caching"
          env:
            - name: VLLM_LOGGING_LEVEL
              value: INFO
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-credentials
                  key: token
                  optional: true
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: models
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          resources:
            requests:
              cpu: 4
              memory: 32Gi
              nvidia.com/gpu: 1
            limits:
              cpu: 16
              memory: 64Gi
              nvidia.com/gpu: 1
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: vllm-models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-models
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 500Gi
