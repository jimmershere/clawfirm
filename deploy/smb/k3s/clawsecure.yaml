# clawsecure manifest for ClawFirm SMB tier (k3s).
#
# This file is a placeholder during the 90-day MVP — the production manifest
# is generated by `clawfirm init --tier smb` from the templates in
# deploy/smb/helm-values/ once the upstream Helm chart is selected.
#
# See docs/install/smb.md for the install path and ROADMAP.md for the
# delivery schedule. The Solo tier compose file (deploy/solo/docker-compose.yml)
# is the canonical reference for image versions, env vars, and inter-service
# wiring; this Kustomize overlay translates that into K8s primitives.

apiVersion: v1
kind: ConfigMap
metadata:
  name: clawsecure-placeholder
data:
  status: "scaffold"
  ref-compose: "deploy/solo/docker-compose.yml#clawsecure"
